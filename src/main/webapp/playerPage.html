<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title th:text="'Player - ' + ${track.title}">Player - [[${track.title}]]</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="player-header">
        <h2 th:text="${track.title}">[[${track.title}]]</h2>
    </div>

    <div class="player-content">
        <div class="album-cover">
            <img th:if="${track.album.image != null}"
                 th:src="@{/uploads/{p}(p=${track.album.image})}"
                 alt="Album cover"/>
        </div>

        <div class="track-info">
            <dl class="info-list">
                <dt>Performer:</dt>
                <dd th:text="${track.album.performer}">[[${track.album.performer}]]</dd>

                <dt>Album:</dt>
                <dd>
                    <span th:text="${track.album.title}">[[${track.album.title}]]</span>
                    (<span th:text="${track.album.publicationYear}">[[${track.album.publicationYear}]]</span>)
                </dd>

                <dt>Genre:</dt>
                <dd th:text="${track.genreName}">[[${track.genreName}]]</dd>
            </dl>

            <div class="audio-player">
                <audio controls>
                    <source th:src="@{/uploads/{p}(p=${track.filePath})}" type="audio/mpeg"/>
                   Audio not supported by your browser.
                </audio>
            </div>
        </div>
    </div>

    <div class="back-link">
        <a th:href="@{/GoToHome}">Back to Home Page</a>
    </div>
</div>
</body>
</html>
